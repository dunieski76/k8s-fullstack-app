apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fullstack-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "waiting for db..."; sleep 2; done']
      containers:
        - name: backend
          image: hashicorp/http-echo:0.2.3
          args: ["-text=API OK - connected to PostgreSQL", "-listen=:8080"]
          ports: [{containerPort: 8080}]
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: fullstack-app
spec:
  selector: {app: backend}
  ports: [{port: 8080, targetPort: 8080}]
