apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fullstack-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/dunieski76/k8s-fullstack-app:8c58d433b2ec1dd37af85cc10a5075803c5956d4
          ports: [{containerPort: 80}]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: fullstack-app
spec:
  type: NodePort
  selector: {app: frontend}
  ports: [{port: 80, targetPort: 80, nodePort: 30080}]
