name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'    # Don't trigger when only k8s manifests change (prevents infinite loop)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Needs write to push the updated manifest back
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/dunieski76/k8s-fullstack-app:${{ github.sha }}
            ghcr.io/dunieski76/k8s-fullstack-app:latest

      - name: Update Kubernetes manifest with new image tag
        run: |
          sed -i "s|image: ghcr.io/dunieski76/k8s-fullstack-app:.*|image: ghcr.io/dunieski76/k8s-fullstack-app:${{ github.sha }}|" k8s/frontend.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/frontend.yaml
          git commit -m "Deploy: update frontend image to ${{ github.sha }}"
          git push
